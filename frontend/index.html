<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance Planner</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div class="app">
  <h1>Attendance Planner</h1>

  <!-- Semester Dates -->
  <div class="card">
    <h2>Semester Dates</h2>
    <div class="grid-3">
      <div class="field">
        <label>Semester Start</label>
        <input type="date" id="semesterStart">
      </div>
      <div class="field">
        <label>Semester End</label>
        <input type="date" id="semesterEnd">
      </div>
      <div class="field">
        <label>Attendance Till</label>
        <input type="date" id="attendanceTill">
      </div>
    </div>
  </div>

  <!-- Weekly Schedule -->
  <div class="card">
    <h2>Weekly Schedule</h2>

    <div class="grid-week">
      <input type="number" id="mon" placeholder="Mon">
      <input type="number" id="tue" placeholder="Tue">
      <input type="number" id="wed" placeholder="Wed">
      <input type="number" id="thu" placeholder="Thu">
      <input type="number" id="fri" placeholder="Fri">
      <input type="number" id="sat" placeholder="Sat">
    </div>

    <!-- Subject-wise toggle -->
    <button type="button" id="toggleSubjects" onclick="toggleSubjects()">
      Enable subject-wise entry
    </button>

    <!-- Subject-wise section -->
    <div id="subjectSection" class="subject-section hidden">
      <div id="subjects"></div>
      <button type="button" onclick="addSubject()">+ Add Subject</button>
    </div>
  </div>

  <!-- Attendance -->
  <div class="card">
    <h2>Attendance</h2>
    <div class="grid-2">
      <input type="number" id="currentPct" placeholder="Current %">
      <input type="number" id="requiredPct" value="75">
    </div>
    <button id="calcBtn" onclick="calculate()">Calculate</button>
  </div>

  <div id="result" class="card hidden"></div>
</div>
</body>
<footer class="footer">
  <p>
    Attendance Planner Prototype • Round 2<br>
    Calculations are indicative and based on provided inputs only
  </p>
</footer>

<script src="script.js"></script>

</html>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="750" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="750" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="700" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#000">
    Attendance Calculator System
  </text>
  <text x="700" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">
    Data Flow Diagram (Level-1)
  </text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000"/>
    </marker>
    <marker id="arrowhead-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- External Entity: Student (User) -->
  <rect x="40" y="280" width="150" height="90" rx="15" ry="15" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <text x="115" y="315" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#000">
    Student (User)
  </text>
  <text x="115" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">
    External Entity
  </text>
  
  <!-- Arrow: Student to Frontend -->
  <line x1="190" y1="325" x2="260" y2="325" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="315" font-family="Arial, sans-serif" font-size="11" fill="#000">
    Attendance Inputs
  </text>
  
  <!-- Frontend Block -->
  <rect x="260" y="130" width="300" height="380" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="410" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">
    Frontend (Web Application)
  </text>
  
  <!-- Frontend Components -->
  <rect x="280" y="185" width="260" height="55" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="217" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    User Input Interface
  </text>
  
  <rect x="280" y="255" width="260" height="55" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="287" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Weekly Schedule Input
  </text>
  
  <rect x="280" y="325" width="260" height="55" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="357" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Optional Subject-wise Input
  </text>
  
  <rect x="280" y="395" width="260" height="55" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="410" y="427" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Result &amp; Risk Visualization
  </text>
  
  <!-- Arrow: Frontend to Backend -->
  <line x1="560" y1="305" x2="640" y2="305" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="575" y="295" font-family="Arial, sans-serif" font-size="11" fill="#000">
    POST /calculate
  </text>
  
  <!-- Backend Block -->
  <rect x="640" y="130" width="320" height="480" fill="#ffffff" stroke="#000" stroke-width="2.5"/>
  <text x="800" y="160" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">
    Backend API (FastAPI)
  </text>
  
  <!-- Backend Processes -->
  <rect x="665" y="185" width="270" height="50" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="800" y="215" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Input Validation
  </text>
  
  <line x1="800" y1="235" x2="800" y2="260" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <rect x="665" y="260" width="270" height="50" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="800" y="290" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Date Iteration Engine
  </text>
  
  <line x1="800" y1="310" x2="800" y2="335" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <rect x="665" y="335" width="270" height="50" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="800" y="365" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Holiday Filter
  </text>
  
  <line x1="800" y1="385" x2="800" y2="410" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <rect x="665" y="410" width="270" height="50" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="800" y="440" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Attendance Calculation Logic
  </text>
  
  <line x1="800" y1="460" x2="800" y2="485" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <rect x="665" y="485" width="270" height="50" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="800" y="515" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#000">
    Rounding &amp; Status Evaluation
  </text>
  
  <!-- Data Store: Holiday Configuration -->
  <ellipse cx="1130" cy="360" rx="100" ry="30" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <path d="M 1030,360 L 1030,365 Q 1030,390 1130,390 Q 1230,390 1230,365 L 1230,360" fill="#ffffff" stroke="#000" stroke-width="2"/>
  <line x1="1030" y1="360" x2="1030" y2="365" stroke="#000" stroke-width="2"/>
  <line x1="1230" y1="360" x2="1230" y2="365" stroke="#000" stroke-width="2"/>
  <text x="1130" y="365" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#000">
    Holiday Configuration
  </text>
  <text x="1130" y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
    (Static Data)
  </text>
  
  <!-- Bidirectional Arrow: Holiday Filter <-> Data Store -->
  <line x1="935" y1="357" x2="1030" y2="357" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="1030" y1="363" x2="935" y2="363" stroke="#000" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow: Backend to Frontend -->
  <line x1="640" y1="340" x2="560" y2="340" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="600" y="320"
        font-family="Arial, sans-serif"
        font-size="11"
        text-anchor="middle"
        fill="#000">
    Attendance Summary &amp; Status
  </text>

  
  

  
  <!-- Future Enhancements -->
  <rect x="1010" y="450" width="270" height="150" fill="#ffffff" stroke="#666" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="1145" y="480" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#666">
    Future Enhancements
  </text>
  <text x="1030" y="510" font-family="Arial, sans-serif" font-size="12" fill="#666">
    • Subject-wise Records Storage
  </text>
  <text x="1030" y="540" font-family="Arial, sans-serif" font-size="12" fill="#666">
    • OCR Timetable Extraction
  </text>
  <text x="1030" y="570" font-family="Arial, sans-serif" font-size="12" fill="#666">
    • Institutional Attendance APIs
  </text>
  
  <line x1="1010" y1="520" x2="960" y2="520" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead-dashed)"/>
  
  <!-- Legend -->
  <rect x="40" y="630" width="1320" height="100" fill="#f9f9f9" stroke="#666" stroke-width="1"/>
  <text x="50" y="655" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">
    Legend:
  </text>
  
  <rect x="60" y="670" width="50" height="30" rx="10" ry="10" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="125" y="690" font-family="Arial, sans-serif" font-size="11" fill="#000">
    External Entity
  </text>
  
  <rect x="260" y="670" width="50" height="30" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="325" y="690" font-family="Arial, sans-serif" font-size="11" fill="#000">
    Process/Component
  </text>
  
  <ellipse cx="510" cy="685" rx="25" ry="12" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <path d="M 485,685 L 485,688 Q 485,697 510,697 Q 535,697 535,688 L 535,685" fill="#ffffff" stroke="#000" stroke-width="1.5"/>
  <text x="560" y="690" font-family="Arial, sans-serif" font-size="11" fill="#000">
    Data Store
  </text>
  
  <line x1="720" y1="685" x2="780" y2="685" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="795" y="690" font-family="Arial, sans-serif" font-size="11" fill="#000">
    Data Flow
  </text>
  
  <line x1="940" y1="685" x2="1000" y2="685" stroke="#666" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowhead-dashed)"/>
  <text x="1015" y="690" font-family="Arial, sans-serif" font-size="11" fill="#666">
    Future Enhancement
  </text>
</svg>